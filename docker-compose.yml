version: '3.8'

services:
  # PostgreSQL database for n8n
  postgres:
    image: postgres:15-alpine
    container_name: n8n_postgres
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_password
      POSTGRES_DB: n8n_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n_network

  # PostgreSQL database for audit
  audit_db:
    image: postgres:15-alpine
    container_name: audit_postgres
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit_password
      POSTGRES_DB: audit_db
    volumes:
      - audit_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n_network

  # API service
  api:
    build: ./api
    container_name: prototype_api
    environment:
      - DATABASE_URL=postgresql://audit:audit_password@audit_db:5432/audit_db
    ports:
      - "8000:8000"
    depends_on:
      audit_db:
        condition: service_healthy
    networks:
      - n8n_network

  # n8n workflow automation
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflow.json:/home/node/.n8n/workflows/workflow.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n_network

volumes:
  postgres_data:
  audit_data:
  n8n_data:

networks:
  n8n_network:
